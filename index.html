<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Analyze PDF files directly in your browser using C++ compiled to WebAssembly. No server uploads — 100% client-side processing.">
    <title>PDF Wasm Analyzer — Browser-Based PDF Analysis</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        /* ─── Design Tokens ──────────────────────────── */
        :root {
            --bg-primary:      #0a0e17;
            --bg-secondary:    #111827;
            --bg-sidebar:      #0f1520;
            --bg-card:         #1a2235;
            --bg-card-hover:   #1f2a40;
            --bg-item:         #151d2e;
            --bg-item-active:  #1c2842;

            --accent-1:        #6366f1;
            --accent-2:        #8b5cf6;
            --accent-3:        #06b6d4;

            --text-primary:    #f1f5f9;
            --text-secondary:  #94a3b8;
            --text-muted:      #64748b;

            --success:         #10b981;
            --error:           #ef4444;
            --warning:         #f59e0b;

            --border:          rgba(148, 163, 184, 0.08);
            --border-hover:    rgba(99, 102, 241, 0.3);
            --border-active:   rgba(99, 102, 241, 0.5);

            --radius:          12px;
            --radius-sm:       8px;
            --radius-lg:       20px;

            --shadow:          0 4px 24px rgba(0, 0, 0, 0.3);
            --shadow-glow:     0 0 40px rgba(99, 102, 241, 0.15);

            --font-sans:       'Inter', system-ui, -apple-system, sans-serif;
            --font-mono:       'JetBrains Mono', 'Fira Code', monospace;

            --transition:      0.25s cubic-bezier(0.4, 0, 0.2, 1);

            --sidebar-width:   300px;
        }

        /* ─── Reset ──────────────────────────────────── */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { font-size: 16px; scroll-behavior: smooth; }

        body {
            font-family: var(--font-sans);
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            line-height: 1.6;
        }

        /* ─── Animated BG ────────────────────────────── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 50% at 20% 20%, rgba(99,102,241,0.06), transparent),
                radial-gradient(ellipse 60% 40% at 80% 80%, rgba(139,92,246,0.05), transparent),
                radial-gradient(ellipse 50% 30% at 50% 50%, rgba(6,182,212,0.03), transparent);
            pointer-events: none;
            z-index: 0;
            animation: bgShift 20s ease-in-out infinite alternate;
        }
        @keyframes bgShift {
            0%   { opacity: .7; transform: scale(1); }
            100% { opacity: 1;  transform: scale(1.05); }
        }

        /* ─── App Shell: sidebar + main ──────────────── */
        .app-shell {
            position: relative;
            z-index: 1;
            display: flex;
            height: 100vh;
        }

        /* ─── SIDEBAR ────────────────────────────────── */
        .sidebar {
            width: var(--sidebar-width);
            min-width: var(--sidebar-width);
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 1.25rem 1rem;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .sidebar-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .sidebar-title .logo {
            width: 22px; height: 22px;
            background: linear-gradient(135deg, var(--accent-1), var(--accent-3));
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
        }

        #wasm-status {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--text-muted);
            padding: 0.2rem 0.55rem;
            border-radius: 100px;
            background: rgba(100,116,139,0.08);
            border: 1px solid var(--border);
            transition: all var(--transition);
        }
        #wasm-status.ready {
            color: var(--success);
            background: rgba(16,185,129,0.08);
            border-color: rgba(16,185,129,0.15);
        }
        #wasm-status.error {
            color: var(--error);
            background: rgba(239,68,68,0.08);
            border-color: rgba(239,68,68,0.15);
        }

        /* Upload button */
        .upload-area {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .upload-btn {
            width: 100%;
            padding: 0.65rem;
            border: 2px dashed rgba(148,163,184,0.12);
            border-radius: var(--radius-sm);
            background: rgba(26,34,53,0.4);
            color: var(--text-secondary);
            font-family: var(--font-sans);
            font-size: 0.82rem;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            opacity: 0.5;
            pointer-events: none;
        }
        .upload-btn.active {
            opacity: 1;
            pointer-events: auto;
        }
        .upload-btn:hover {
            border-color: var(--accent-1);
            background: rgba(99,102,241,0.05);
            color: var(--text-primary);
            transform: translateY(-1px);
        }
        .upload-btn.dragover {
            border-color: var(--accent-1);
            border-style: solid;
            background: rgba(99,102,241,0.08);
            color: var(--text-primary);
        }

        #file-input { display: none; }

        /* Document list */
        .doc-list-header {
            padding: 0.6rem 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .doc-count {
            font-size: 0.72rem;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .clear-all-btn {
            font-family: var(--font-sans);
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--error);
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            transition: all var(--transition);
            opacity: 0;
            pointer-events: none;
        }
        .clear-all-btn.visible {
            opacity: 1;
            pointer-events: auto;
        }
        .clear-all-btn:hover {
            background: rgba(239,68,68,0.1);
        }

        .doc-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }

        .doc-list::-webkit-scrollbar { width: 4px; }
        .doc-list::-webkit-scrollbar-track { background: transparent; }
        .doc-list::-webkit-scrollbar-thumb {
            background: rgba(148,163,184,0.15);
            border-radius: 4px;
        }

        /* Individual doc item */
        .doc-item {
            position: relative;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.65rem 0.75rem;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all var(--transition);
            border: 1px solid transparent;
            margin-bottom: 2px;
        }
        .doc-item:hover {
            background: var(--bg-item);
            border-color: var(--border);
        }
        .doc-item.selected {
            background: var(--bg-item-active);
            border-color: var(--border-active);
        }

        .doc-item-icon {
            width: 32px; height: 32px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            flex-shrink: 0;
        }
        .doc-item-icon.valid {
            background: rgba(16,185,129,0.1);
            color: var(--success);
        }
        .doc-item-icon.invalid {
            background: rgba(239,68,68,0.1);
            color: var(--error);
        }

        .doc-item-info {
            flex: 1;
            min-width: 0;
        }

        .doc-item-name {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .doc-item-meta {
            font-size: 0.68rem;
            color: var(--text-muted);
            display: flex;
            gap: 0.5rem;
        }

        .doc-item-delete {
            position: absolute;
            top: 50%;
            right: 0.5rem;
            transform: translateY(-50%);
            width: 22px; height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            border-radius: 4px;
            background: transparent;
            color: var(--text-muted);
            font-size: 0.85rem;
            cursor: pointer;
            opacity: 0;
            transition: all var(--transition);
        }
        .doc-item:hover .doc-item-delete { opacity: 1; }
        .doc-item-delete:hover {
            background: rgba(239,68,68,0.15);
            color: var(--error);
        }

        .doc-list-empty {
            text-align: center;
            padding: 2rem 1rem;
            color: var(--text-muted);
            font-size: 0.82rem;
        }
        .doc-list-empty .empty-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            display: block;
            opacity: 0.4;
        }

        /* ─── MAIN CONTENT ───────────────────────────── */
        .main-content {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .main-content::-webkit-scrollbar { width: 6px; }
        .main-content::-webkit-scrollbar-track { background: transparent; }
        .main-content::-webkit-scrollbar-thumb {
            background: rgba(148,163,184,0.12);
            border-radius: 6px;
        }

        /* Empty state */
        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }

        .empty-state .empty-icon {
            font-size: 3.5rem;
            margin-bottom: 1.25rem;
            opacity: 0.3;
        }

        .empty-state h2 {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .empty-state p {
            font-size: 0.9rem;
            color: var(--text-muted);
            max-width: 360px;
        }

        /* Detail view */
        .detail-view {
            padding: 2rem;
            animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .detail-header {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .detail-icon {
            width: 52px; height: 52px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            flex-shrink: 0;
        }
        .detail-icon.valid {
            background: rgba(16,185,129,0.1);
            color: var(--success);
        }
        .detail-icon.invalid {
            background: rgba(239,68,68,0.1);
            color: var(--error);
        }

        .detail-title {
            font-size: 1.25rem;
            font-weight: 700;
            word-break: break-all;
            margin-bottom: 0.3rem;
        }

        .detail-message {
            font-size: 0.85rem;
        }
        .detail-message.valid  { color: var(--success); }
        .detail-message.invalid { color: var(--error); }

        .detail-time {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.3rem;
        }

        /* Stats grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.75rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1rem 1.15rem;
            transition: border-color var(--transition);
        }
        .stat-card:hover {
            border-color: var(--border-hover);
        }

        .stat-label {
            display: block;
            font-size: 0.68rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
        }

        .stat-value {
            display: block;
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .stat-value small {
            font-size: 0.75rem;
            font-weight: 400;
            color: var(--text-muted);
        }

        .stat-value.mono {
            font-family: var(--font-mono);
            font-size: 0.88rem;
        }

        /* Badges */
        .badges-row {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.35rem 0.75rem;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 500;
            border: 1px solid;
        }
        .badge.yes {
            color: var(--success);
            background: rgba(16,185,129,0.08);
            border-color: rgba(16,185,129,0.2);
        }
        .badge.no {
            color: var(--text-muted);
            background: rgba(100,116,139,0.06);
            border-color: var(--border);
        }
        .badge.warn {
            color: var(--warning);
            background: rgba(245,158,11,0.08);
            border-color: rgba(245,158,11,0.2);
        }

        /* Raw JSON */
        .raw-json { margin-top: 0.5rem; }

        .raw-json summary {
            font-size: 0.8rem;
            color: var(--text-muted);
            cursor: pointer;
            padding: 0.5rem 0;
            transition: color var(--transition);
        }
        .raw-json summary:hover { color: var(--accent-3); }

        .raw-json pre {
            margin-top: 0.5rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 1rem;
            overflow-x: auto;
            font-size: 0.78rem;
            line-height: 1.5;
        }
        .raw-json code {
            font-family: var(--font-mono);
            color: var(--accent-3);
        }

        /* Error card */
        .error-toast {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            background: rgba(239,68,68,0.12);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(239,68,68,0.25);
            border-radius: var(--radius);
            padding: 0.85rem 1.25rem;
            z-index: 100;
            animation: toastIn 0.35s ease-out;
            max-width: 450px;
        }
        .error-toast p {
            font-size: 0.85rem;
            color: var(--error);
        }
        @keyframes toastIn {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Loading spinner in sidebar */
        .doc-item-loading {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.65rem 0.75rem;
            margin-bottom: 2px;
        }
        .mini-spinner {
            width: 18px; height: 18px;
            border: 2px solid var(--border);
            border-top-color: var(--accent-1);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            flex-shrink: 0;
            margin-left: 7px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .doc-item-loading span {
            font-size: 0.78rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ─── Responsive ─────────────────────────────── */
        @media (max-width: 700px) {
            :root { --sidebar-width: 100%; }
            .app-shell { flex-direction: column; }
            .sidebar {
                width: 100%;
                min-width: 100%;
                max-height: 45vh;
                border-right: none;
                border-bottom: 1px solid var(--border);
            }
            .stats-grid { grid-template-columns: 1fr 1fr; }
        }

        /* ─── PDFium Section ─────────────────────────── */
        .pdfium-section {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
        }

        .section-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 1rem;
        }

        .action-buttons {
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
            margin-bottom: 1.25rem;
        }

        .action-btn {
            font-family: var(--font-sans);
            font-size: 0.82rem;
            font-weight: 500;
            padding: 0.55rem 1rem;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-hover);
            background: rgba(99,102,241,0.06);
            color: var(--accent-1);
            cursor: pointer;
            transition: all var(--transition);
        }
        .action-btn:hover:not(:disabled) {
            background: rgba(99,102,241,0.12);
            border-color: var(--accent-1);
            transform: translateY(-1px);
        }
        .action-btn:disabled {
            cursor: default;
            opacity: 0.6;
        }
        .action-btn.done {
            color: var(--success);
            border-color: rgba(16,185,129,0.3);
            background: rgba(16,185,129,0.06);
        }
        .action-btn.save-btn {
            border-color: rgba(6,182,212,0.3);
            color: var(--accent-3);
            background: rgba(6,182,212,0.06);
        }
        .action-btn.save-btn:hover:not(:disabled) {
            background: rgba(6,182,212,0.12);
            border-color: var(--accent-3);
        }
        .action-btn.save-btn.done {
            color: var(--success);
            border-color: rgba(16,185,129,0.3);
            background: rgba(16,185,129,0.06);
        }

        /* Text extraction result */
        .text-result {
            margin-top: 0.75rem;
        }
        .text-stats {
            display: flex;
            gap: 1rem;
            margin-bottom: 0.6rem;
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        .text-stats span {
            background: rgba(100,116,139,0.1);
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
        }
        .extracted-text-content {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 1rem;
            max-height: 300px;
            overflow-y: auto;
            font-family: var(--font-mono);
            font-size: 0.78rem;
            line-height: 1.6;
            color: var(--text-secondary);
            white-space: pre-wrap;
            word-break: break-word;
        }
        .extracted-text-content::-webkit-scrollbar { width: 5px; }
        .extracted-text-content::-webkit-scrollbar-thumb {
            background: rgba(148,163,184,0.15);
            border-radius: 4px;
        }

        /* Page preview */
        .page-preview-result {
            margin-top: 1rem;
            text-align: center;
        }
        .page-preview-img {
            max-width: 100%;
            max-height: 500px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }
        .preview-dims {
            font-size: 0.72rem;
            color: var(--text-muted);
            margin-top: 0.5rem;
        }

        .text-error {
            color: var(--error);
            font-size: 0.85rem;
            padding: 0.5rem;
        }

        .text-muted-note {
            color: var(--text-muted);
            font-size: 0.85rem;
            padding: 0.5rem 0;
        }

        /* ─── Toast System ───────────────────────────── */
        .toast {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            backdrop-filter: blur(16px);
            border-radius: var(--radius);
            padding: 0.85rem 1.25rem;
            z-index: 100;
            animation: toastIn 0.35s ease-out;
            max-width: 450px;
        }
        .toast p {
            font-size: 0.85rem;
        }
        .toast-error {
            background: rgba(239,68,68,0.12);
            border: 1px solid rgba(239,68,68,0.25);
        }
        .toast-error p { color: var(--error); }
        .toast-success {
            background: rgba(16,185,129,0.12);
            border: 1px solid rgba(16,185,129,0.25);
        }
        .toast-success p { color: var(--success); }

        /* Status badges row in sidebar */
        .status-badges {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
            margin-top: 0.35rem;
        }
        #pdfium-status {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--text-muted);
            padding: 0.2rem 0.55rem;
            border-radius: 100px;
            background: rgba(100,116,139,0.08);
            border: 1px solid var(--border);
            transition: all var(--transition);
        }
        #pdfium-status.ready {
            color: var(--accent-3);
            background: rgba(6,182,212,0.08);
            border-color: rgba(6,182,212,0.15);
        }
        #pdfium-status.error {
            color: var(--error);
            background: rgba(239,68,68,0.08);
            border-color: rgba(239,68,68,0.15);
        }
    </style>
</head>
<body>
    <div class="app-shell">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title">
                    <span class="logo">📄</span>
                    PDF Wasm Analyzer
                </div>
                <div id="wasm-status">⏳ Loading…</div>
                <div class="status-badges">
                    <div id="pdfium-status">⏳ PDFium…</div>
                </div>
            </div>

            <div class="upload-area">
                <button class="upload-btn" id="upload-btn">
                    ＋ Upload PDFs
                </button>
                <input type="file" id="file-input" accept=".pdf,application/pdf" multiple disabled>
            </div>

            <div class="doc-list-header">
                <span class="doc-count" id="doc-count">Documents</span>
                <button class="clear-all-btn" id="clear-all">Clear all</button>
            </div>

            <div class="doc-list" id="doc-list"></div>
        </aside>

        <!-- Main content -->
        <main class="main-content" id="main-content">
            <div class="empty-state" id="empty-state">
                <span class="empty-icon">📊</span>
                <h2>Select a document</h2>
                <p>Upload PDF files using the sidebar, then click one to see its full analysis.</p>
            </div>
        </main>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
